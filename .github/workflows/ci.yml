name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install style tools
        run: pip install flake8 isort
      - name: Run flake8
        run: flake8 pretix_waitinglistsms tests
      - name: Run isort
        run: isort --check-only --diff pretix_waitinglistsms tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pretix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PRETIX_CONFIG_FILE: .github/pretix.cfg
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pretix and plugin
        run: |
          pip install wheel setuptools pytest pytest-django pytest-cov
          pip install pretix
          pip install -e .
      - name: Run tests
        run: python -m pytest tests --cov=pretix_waitinglistsms --cov-report=term-missing

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: pip install build twine check-manifest
      - name: Check MANIFEST.in
        run: check-manifest
      - name: Build package
        run: python -m build
      - name: Check package metadata
        run: twine check dist/*
      - name: Upload built package
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
